<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Objeter Bootstrap de:  https://getbootstrap.com -> get started -> Starter template-->

    <!-- Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    <title>Aplicación Calculadora</title>
</head>
<body>
    <!-- clase de bootstrap, mejora el aspecto de nuestro contenido -->
    <div class="container">
        <h1>Aplicación Calculadora</h1>
        <form id="forma">
            <!-- Clase de estilos de bootstrap: Margin Bottom de 3 -->
            <!-- Revisar la guía de espacios bootstrap del instructor -->
            <div class="mb-3">
                <label for="operandoA">Operando A</label>
                <input type="number" class="form-control" placeholder="Escribe el operando A" id="operandoA" />
            </div>
            <div class="mb-3">
                <label for="operandoB">Operando B</label>
                <input type="number" class="form-control" placeholder="Escribe el operando B" id="operandoB" />
            </div>
            <!-- Clase Bootstrap: boton, color primario azul margin bottom 3 -->
        </form>
        <button class="btn btn-primary mb-3" onclick="sumar()">Sumar</button>
        <div id="resultado"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
