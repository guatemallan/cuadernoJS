<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de personas</title>
    <link href="css/estilos.css" rel="stylesheet"/>

</head>
<!-- llamamos la funcion para cargar el listado de personas -->
<body onload="mostrarPersonas()">
    <div class="contenedor" id="cabecero">
        <h1>Listado de personas</h1>
    </div>

    <div class="contenedor" id="">
        <div class="elemento">
            <ul id="personas">
                <!-- vamos a agregar dinámicamente <li>Allan Barrera</li> -->
            </ul>
        </div>
    </div>

    <div class="contenedor">
        <div style="text-align: center;">
            <button style="cursor: pointer;" onclick="agregarPersona()">+</button>
        </div>
        <form id="forma">
            <input type="text" id="nombre" placeholder="Nombre"/>
            <input type="text" id="apellido" placeholder="Apellido"/>
        </form>
    </div>

    <!-- Se agrega primero el script que no tiene dependencias -->
    <!-- estos scripts no se pueden cerrar con />, hay que cerrar con </script> -->
    <script src="js/persona.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
