<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de CSS con DOM</title>
</head>
<body>
    <h1 id="titulo">Cambio de CSS con DOM</h1>

    <button onclick="cambiar()">Cambiar Estilo</button>
    <br/>

    <script>
        function cambiar(){
            document.getElementById('titulo').style.color = 'blue';
        }
    </script>
</body>
</html>
