<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Formulario DOM JS</title>
</head>
<body>
    <form id="formulario">
        Nombre: <input type="text" name="nombre" value="Juan"/><br/>
        Apellido: <input type="text" name="apellido" value="Valdez"/><br/>
    </form>
    <!-- boton con función JS fuera del formulario -->
    <button onclick="mostrarValores()">Mostrar valores...</button>

    <div id="valores"></div>

    <script>
        function mostrarValores(){
            let formulario = document.forms['formulario'];
            let texto ='';
            for(let elemento of formulario){
                texto += elemento.value + '<br/>';
            }
            console.log(texto);
            // vamos a agregar los valores al div valores
            document.getElementById('valores').innerHTML = texto;

            // OTRA MANERA DE ACCEDER A LOS OBJETOS
            // recuperamos directamente el objeto <input> de nombre
            let nombre = formulario['nombre'];

            // recuperamos directamente el objeto <input> de apellido
            let apellido = formulario['apellido'];

            console.log(nombre);
            console.log(nombre.value);
            console.log(apellido);
            console.log(apellido.value);
        }
    </script>
</body>
</html>
